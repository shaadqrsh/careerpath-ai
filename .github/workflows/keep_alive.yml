name: Keep Projects Awake

on:
  schedule:
    # Runs every 24 hours at midnight.
    # This is safe for both HF (48h limit) and Supabase (7d limit).
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run this manually anytime

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        run: curl -I "${{ secrets.HF_SPACE_URL }}"

      - name: Ping Supabase Database
        run: |
          # Replace 'profiles' with any real table name in your database
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
